<app-button (btnClick)="onButtonClick()">
  <span>Нажми меня</span>
</app-button>

<app-input
  type="email"
  iconUrl="icons/mail.svg"
  (controlValue)="onInputChange($event)"
  placeholder="Email" />

<app-input
  type="password"
  iconUrl="icons/lock-password.svg"
  (controlValue)="onInputChange($event)"
  placeholder="Email" />
